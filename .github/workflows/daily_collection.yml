name: Daily Data Collection

on:
  schedule:
    # Run every day at 2 AM UTC (adjust timezone as needed)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-prod-2026.txt

      - name: Run heavy collectors
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd datacollect-pro-cameroun
          python backend/scripts/run_heavy_collectors.py

      - name: Log collection status
        if: always()
        run: |
          echo "Collection job completed at $(date)"
